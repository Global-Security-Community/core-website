name: Delete Chapter Page

on:
  workflow_dispatch:
    inputs:
      chapter_slug:
        description: 'Chapter slug to delete (e.g. "perth", "london")'
        required: true
        type: string

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  delete-chapter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Verify chapter exists
        env:
          SLUG: ${{ inputs.chapter_slug }}
        run: |
          # Validate slug format
          if ! [[ "$SLUG" =~ ^[a-z0-9][a-z0-9-]{0,60}[a-z0-9]$ ]]; then
            echo "::error::Invalid chapter slug format: must be lowercase alphanumeric with hyphens"
            exit 1
          fi

          # Verify path stays within expected directory
          RESOLVED=$(realpath -m "src/chapters/${SLUG}")
          EXPECTED_PREFIX=$(realpath "src/chapters")
          if [[ "$RESOLVED" != "$EXPECTED_PREFIX"/* ]]; then
            echo "::error::Path traversal detected in slug"
            exit 1
          fi

          if [ ! -f "src/chapters/${SLUG}/index.md" ]; then
            echo "❌ Chapter 'src/chapters/${SLUG}/index.md' not found"
            exit 1
          fi
          echo "Found chapter: ${SLUG}"

      - name: Archive Discord channel
        env:
          SLUG: ${{ inputs.chapter_slug }}
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
        run: |
          # Extract discord_channel_id from frontmatter
          CHANNEL_ID=$(grep 'discord_channel_id:' "src/chapters/${SLUG}/index.md" | sed 's/.*discord_channel_id: *"\{0,1\}\([^"]*\)"\{0,1\}/\1/' | tr -d ' ')
          
          if [ -z "$CHANNEL_ID" ] || [ "$CHANNEL_ID" = "" ]; then
            echo "No Discord channel ID found — skipping archive"
            exit 0
          fi

          echo "Archiving Discord channel: ${CHANNEL_ID}"

          # Rename channel with archived- prefix and move out of chapters category
          curl -s -X PATCH "https://discord.com/api/v10/channels/${CHANNEL_ID}" \
            -H "Authorization: Bot ${BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"archived-${SLUG}\", \"permission_overwrites\": [{\"id\": \"${GUILD_ID}\", \"type\": 0, \"deny\": \"2048\"}]}"

          # Post archive notice
          curl -s -X POST "https://discord.com/api/v10/channels/${CHANNEL_ID}/messages" \
            -H "Authorization: Bot ${BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"embeds": [{"title": "📦 Chapter Archived", "description": "This chapter has been archived. The channel is now read-only.", "color": 16753920}]}'

          echo "Discord channel archived"

      - name: Delete chapter
        env:
          SLUG: ${{ inputs.chapter_slug }}
        run: |
          rm -rf "src/chapters/${SLUG}"
          echo "Deleted src/chapters/${SLUG}/"

      - name: Commit and push
        env:
          SLUG: ${{ inputs.chapter_slug }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          BRANCH="auto/delete-chapter-${SLUG}"
          git checkout -b "${BRANCH}"
          git commit -m "Remove chapter page: ${SLUG}

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push origin "${BRANCH}"
          echo "BRANCH=${BRANCH}" >> "$GITHUB_ENV"

      # main is protected and requires the "Build & Test" check to pass. A PR
      # opened with the default GITHUB_TOKEN won't auto-trigger that check
      # (GitHub suppresses recursive triggers from the built-in token), so we
      # kick it off explicitly, then let auto-merge complete once it passes.
      - name: Open PR and wait for merge
        if: env.BRANCH != ''
        env:
          # Org policy blocks the default GITHUB_TOKEN from creating/approving
          # PRs, so this uses a fine-grained PAT scoped to this repo only,
          # with Pull requests: read & write permission (no contents access).
          GH_TOKEN: ${{ secrets.GH_PR_TOKEN }}
          SLUG: ${{ inputs.chapter_slug }}
        run: |
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "Remove chapter page: ${SLUG}" \
            --body "Removes the chapter page for \`${SLUG}\`.

          Triggered by \`delete-chapter\` workflow dispatch."
          PR_NUMBER=$(gh pr view "${BRANCH}" --json number -q .number)

          gh workflow run ci.yml --ref "${BRANCH}"
          gh pr merge "$PR_NUMBER" --auto --squash

          echo "Waiting for PR #$PR_NUMBER to merge..."
          for i in $(seq 1 40); do
            STATE=$(gh pr view "$PR_NUMBER" --json state -q .state)
            if [ "$STATE" = "MERGED" ]; then
              echo "✅ PR #$PR_NUMBER merged"
              exit 0
            fi
            if [ "$STATE" = "CLOSED" ]; then
              echo "::error::PR #$PR_NUMBER was closed without merging"
              exit 1
            fi
            sleep 15
          done
          echo "::error::Timed out waiting for PR #$PR_NUMBER to merge (CI may have failed)"
          exit 1

      - name: Deploy to production
        if: env.BRANCH != ''
        run: |
          git fetch origin main live-version-swa
          git checkout live-version-swa
          git merge origin/main --no-edit
          git push origin live-version-swa
          echo "✅ Chapter deletion merged to live-version-swa"

      - name: Trigger SWA deploy
        if: env.BRANCH != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run azure-static-web-apps-lively-desert-0f1f18c10.yml --ref live-version-swa
          echo "✅ SWA deploy triggered"
