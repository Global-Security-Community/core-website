name: Generate Event Page

on:
  repository_dispatch:
    types: [event-created]

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Geocode event location
        run: |
          # Look up coordinates from the event location using OpenStreetMap Nominatim
          QUERY=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "${LOCATION}")
          RESPONSE=$(curl -s -H "User-Agent: GSC-EventGenerator/1.0" \
            "https://nominatim.openstreetmap.org/search?q=${QUERY}&format=json&limit=1")

          LATITUDE=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r[0]['lat'] if r else '')" 2>/dev/null || echo "")
          LONGITUDE=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r[0]['lon'] if r else '')" 2>/dev/null || echo "")

          if [ -z "$LATITUDE" ] || [ -z "$LONGITUDE" ]; then
            echo "::warning::Could not geocode '${LOCATION}' — coordinates will need to be added manually"
            LATITUDE=""
            LONGITUDE=""
          else
            echo "Geocoded '${LOCATION}' → ${LATITUDE}, ${LONGITUDE}"
          fi

          echo "LATITUDE=${LATITUDE}" >> "$GITHUB_ENV"
          echo "LONGITUDE=${LONGITUDE}" >> "$GITHUB_ENV"
        env:
          LOCATION: ${{ github.event.client_payload.event_location }}

      - name: Generate event page
        env:
          SLUG: ${{ github.event.client_payload.event_slug }}
          TITLE: ${{ github.event.client_payload.event_title }}
          DATE: ${{ github.event.client_payload.event_date }}
          LOCATION: ${{ github.event.client_payload.event_location }}
          DESCRIPTION: ${{ github.event.client_payload.event_description }}
          SESSIONIZE_ID: ${{ github.event.client_payload.event_sessionize_id }}
          REG_CAP: ${{ github.event.client_payload.event_registration_cap }}
          CHAPTER_SLUG: ${{ github.event.client_payload.chapter_slug }}
        run: |
          # Validate slug format (alphanumeric and hyphens only)
          if ! [[ "$SLUG" =~ ^[a-z0-9][a-z0-9-]{0,60}[a-z0-9]$ ]]; then
            echo "::error::Invalid event slug format: must be lowercase alphanumeric with hyphens"
            exit 1
          fi
          if ! [[ "$CHAPTER_SLUG" =~ ^[a-z0-9][a-z0-9-]{0,60}[a-z0-9]$ ]]; then
            echo "::error::Invalid chapter slug format"
            exit 1
          fi

          # Verify resolved path stays within expected directory
          TARGET_DIR="src/events/${SLUG}"
          RESOLVED=$(realpath -m "$TARGET_DIR")
          EXPECTED_PREFIX=$(realpath "src/events")
          if [[ "$RESOLVED" != "$EXPECTED_PREFIX"/* ]]; then
            echo "::error::Path traversal detected in slug"
            exit 1
          fi

          mkdir -p "$TARGET_DIR"

          cat > "${TARGET_DIR}/index.md" << 'FRONTMATTER'
          ---
          layout: event.njk
          FRONTMATTER

          # Use printf to safely write fields that may contain special characters
          # Escape double quotes for valid YAML inline strings
          safe_yaml_inline() { echo "$1" | tr '\n' ' ' | sed 's/  */ /g; s/^ //; s/ $//; s/"/\\"/g'; }
          # Write multi-line description as YAML block scalar (preserves paragraphs)
          {
            printf 'title: "%s"\n' "$(safe_yaml_inline "${TITLE}")"
            printf 'slug: "%s"\n' "${SLUG}"
            printf 'date: "%s"\n' "${DATE}"
            printf 'location: "%s"\n' "$(safe_yaml_inline "${LOCATION}")"
            printf 'description: |\n'
            echo "${DESCRIPTION}" | sed 's/^/  /'
            printf 'sessionizeApiId: "%s"\n' "${SESSIONIZE_ID}"
            printf 'registrationCap: %s\n' "${REG_CAP:-0}"
            printf 'chapterSlug: "%s"\n' "${CHAPTER_SLUG}"
            if [ -n "${LATITUDE}" ] && [ -n "${LONGITUDE}" ]; then
              printf 'latitude: %s\n' "${LATITUDE}"
              printf 'longitude: %s\n' "${LONGITUDE}"
            fi
            echo "---"
          } >> "${TARGET_DIR}/index.md"

          echo "Generated event page at ${TARGET_DIR}/index.md"

      - name: Commit and push
        env:
          EVENT_TITLE: ${{ github.event.client_payload.event_title }}
          EVENT_DATE: ${{ github.event.client_payload.event_date }}
          CHAPTER_SLUG: ${{ github.event.client_payload.chapter_slug }}
          SLUG: ${{ github.event.client_payload.event_slug }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Pull latest changes before branching
          git pull --rebase origin main
          git add .
          git diff --cached --quiet && echo "No changes" && exit 0
          BRANCH="auto/event-${SLUG}"
          git checkout -b "${BRANCH}"
          git commit -m "Add event page: ${EVENT_TITLE}

          Event: ${EVENT_TITLE}
          Date: ${EVENT_DATE}
          Chapter: ${CHAPTER_SLUG}

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push origin "${BRANCH}"
          echo "BRANCH=${BRANCH}" >> "$GITHUB_ENV"

      - name: Create PR and enable auto-merge
        if: env.BRANCH != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          EVENT_TITLE: ${{ github.event.client_payload.event_title }}
        run: |
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "Add event page: ${EVENT_TITLE}" \
            --body "Auto-generated event page.

          Triggered by \`event-created\` repository dispatch."
          gh pr merge "${BRANCH}" --auto --squash || echo "::warning::Auto-merge could not be enabled — please merge the PR manually once CI passes"
          echo "✅ PR created — will merge to main once CI passes"
