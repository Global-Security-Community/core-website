name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - live-version-swa
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - live-version-swa
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: true
        lfs: false
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '22'
    - name: Install dependencies
      run: npm ci
    - name: Install API dependencies and test
      run: cd api && npm ci && npm test
    - name: Audit dependencies
      run: cd api && npm audit --audit-level=high
    - name: Verify all functions load without errors
      run: cd api && node -e "require('./src/app.js')"
    - name: Validate CSP includes Turnstile
      run: |
        if ! grep -q 'connect-src.*challenges.cloudflare.com' staticwebapp.config.json; then
          echo "::error::CSP connect-src missing challenges.cloudflare.com — Turnstile forms will break"
          exit 1
        fi
    - name: Validate no API functions return 404
      run: |
        if grep -rn "status: 404" api/src/functions/ | grep -v node_modules | grep -v test; then
          echo "::warning::API functions returning 404 will be rewritten to index.html by SWA responseOverrides"
        fi
    - name: Build
      run: npm run build
    - name: Clean API dev dependencies
      run: cd api && rm -rf node_modules && npm install --omit=dev
    - name: Build And Deploy
      id: builddeploy
      uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LIVELY_DESERT_0F1F18C10 }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "upload"
        app_location: "/"
        api_location: "api"
        output_location: "_site"
          ###### End of Repository/Build Configurations ######

  smoke_test_job:
    needs: build_and_deploy_job
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Post-Deploy Smoke Tests
    steps:
      - name: Wait for deployment to stabilise
        run: sleep 30

      # Cloudflare bot protection may return 403 for GitHub Actions runner IPs.
      # These tests accept 403 with a warning — the value is catching 500s and misconfigurations.
      - name: Smoke test - Events API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -A "GSC-Smoke-Test/1.0" "https://globalsecurity.community/api/getEvent?action=list")
          echo "Events API: $STATUS"
          if [ "$STATUS" = "403" ]; then
            echo "::warning::Cloudflare blocked request (403) — verify manually"
          elif [ "$STATUS" != "200" ]; then
            echo "::error::Events API returned $STATUS — expected 200"
            exit 1
          fi

      - name: Smoke test - Homepage
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -A "GSC-Smoke-Test/1.0" "https://globalsecurity.community/")
          echo "Homepage: $STATUS"
          if [ "$STATUS" = "403" ]; then
            echo "::warning::Cloudflare blocked request (403) — verify manually"
          elif [ "$STATUS" != "200" ]; then
            echo "::error::Homepage returned $STATUS — expected 200"
            exit 1
          fi

      - name: Smoke test - Events page
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -A "GSC-Smoke-Test/1.0" "https://globalsecurity.community/events/")
          echo "Events page: $STATUS"
          if [ "$STATUS" = "403" ]; then
            echo "::warning::Cloudflare blocked request (403) — verify manually"
          elif [ "$STATUS" != "200" ]; then
            echo "::error::Events page returned $STATUS — expected 200"
            exit 1
          fi

      - name: Smoke test - Chapters page
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -A "GSC-Smoke-Test/1.0" "https://globalsecurity.community/chapters/")
          echo "Chapters page: $STATUS"
          if [ "$STATUS" = "403" ]; then
            echo "::warning::Cloudflare blocked request (403) — verify manually"
          elif [ "$STATUS" != "200" ]; then
            echo "::error::Chapters page returned $STATUS — expected 200"
            exit 1
          fi

      - name: Smoke test - CSP includes Turnstile
        run: |
          CSP=$(curl -sI -A "GSC-Smoke-Test/1.0" "https://globalsecurity.community/" | grep -i "content-security-policy" || echo "")
          if [ -z "$CSP" ]; then
            echo "::warning::Could not retrieve CSP header (likely Cloudflare 403) — verify manually"
          elif ! echo "$CSP" | grep -q "challenges.cloudflare.com"; then
            echo "::error::CSP header missing challenges.cloudflare.com — Turnstile will break"
            exit 1
          else
            echo "CSP header OK: includes challenges.cloudflare.com"
          fi

      - name: Smoke test - API returns JSON (not HTML 404 override)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -A "GSC-Smoke-Test/1.0" "https://globalsecurity.community/api/getEvent?action=list")
          if [ "$STATUS" = "403" ]; then
            echo "::warning::Cloudflare blocked request (403) — cannot verify API response format"
          else
            BODY=$(curl -s -A "GSC-Smoke-Test/1.0" "https://globalsecurity.community/api/getEvent?action=list" | head -c 1)
            if [ "$BODY" = "<" ]; then
              echo "::error::API returned HTML (likely SWA 404 override) — check function registration"
              exit 1
            elif [ -z "$BODY" ]; then
              echo "::warning::Empty response — verify manually"
            else
              echo "API returns non-HTML content — OK"
            fi
          fi

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LIVELY_DESERT_0F1F18C10 }}
          action: "close"