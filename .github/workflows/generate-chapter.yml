name: Generate Chapter Page

on:
  repository_dispatch:
    types: [chapter-approved]

permissions:
  contents: write

jobs:
  generate-chapter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate chapter page
        env:
          CITY: ${{ github.event.client_payload.chapter_city }}
          COUNTRY: ${{ github.event.client_payload.chapter_country }}
          SLUG: ${{ github.event.client_payload.chapter_slug }}
          LEAD_NAME: ${{ github.event.client_payload.lead_name }}
          LEAD_LINKEDIN: ${{ github.event.client_payload.lead_linkedin }}
          LEAD_GITHUB: ${{ github.event.client_payload.lead_github }}
          DISCORD_CHANNEL_ID: ${{ github.event.client_payload.discord_channel_id }}
          DISCORD_GUILD_ID: ${{ vars.DISCORD_GUILD_ID }}
          SECOND_LEAD_JSON: ${{ github.event.client_payload.second_lead }}
          LEAD_EMAIL: ${{ github.event.client_payload.lead_email }}
        run: |
          # Validate slug format (alphanumeric and hyphens only)
          if ! [[ "$SLUG" =~ ^[a-z0-9][a-z0-9-]{0,60}[a-z0-9]$ ]]; then
            echo "::error::Invalid chapter slug format: must be lowercase alphanumeric with hyphens"
            exit 1
          fi

          # Verify resolved path stays within expected directory
          TARGET_DIR="src/chapters/${SLUG}"
          RESOLVED=$(realpath -m "$TARGET_DIR")
          EXPECTED_PREFIX=$(realpath "src/chapters")
          if [[ "$RESOLVED" != "$EXPECTED_PREFIX"/* ]]; then
            echo "::error::Path traversal detected in slug"
            exit 1
          fi

          # Parse second lead from JSON string safely via env var
          SECOND_LEAD_NAME=$(echo "${SECOND_LEAD_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('name',''))" 2>/dev/null || echo "")
          SECOND_LEAD_EMAIL=$(echo "${SECOND_LEAD_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('email',''))" 2>/dev/null || echo "")
          SECOND_LEAD_LINKEDIN=$(echo "${SECOND_LEAD_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('linkedin',''))" 2>/dev/null || echo "")
          SECOND_LEAD_GITHUB=$(echo "${SECOND_LEAD_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('github',''))" 2>/dev/null || echo "")

          mkdir -p "$TARGET_DIR"

          # Build the YAML leads list with Gravatar email hashes
          LEAD_HASH=$(echo -n "${LEAD_EMAIL}" | tr '[:upper:]' '[:lower:]' | tr -d ' ' | md5sum | cut -d' ' -f1)

          # Build chapter page with proper YAML indentation using printf for safety
          {
            echo "---"
            echo "layout: chapter.njk"
            printf 'title: "Global Security Community %s"\n' "${CITY}"
            printf 'city: "%s"\n' "${CITY}"
            printf 'country: "%s"\n' "${COUNTRY}"
            echo "tags: chapter"
            printf 'discord_channel_id: "%s"\n' "${DISCORD_CHANNEL_ID}"
            printf 'discord_guild_id: "%s"\n' "${DISCORD_GUILD_ID}"
            echo "leads:"
            printf '  - name: "%s"\n' "${LEAD_NAME}"
            printf '    email_hash: "%s"\n' "${LEAD_HASH}"
            if [ -n "${LEAD_GITHUB}" ]; then
              printf '    github: "%s"\n' "${LEAD_GITHUB}"
            fi
            if [ -n "${LEAD_LINKEDIN}" ]; then
              printf '    linkedin: "%s"\n' "${LEAD_LINKEDIN}"
            fi
            if [ -n "${SECOND_LEAD_NAME}" ]; then
              SECOND_HASH=$(echo -n "${SECOND_LEAD_EMAIL}" | tr '[:upper:]' '[:lower:]' | tr -d ' ' | md5sum | cut -d' ' -f1)
              printf '  - name: "%s"\n' "${SECOND_LEAD_NAME}"
              printf '    email_hash: "%s"\n' "${SECOND_HASH}"
              if [ -n "${SECOND_LEAD_GITHUB}" ]; then
                printf '    github: "%s"\n' "${SECOND_LEAD_GITHUB}"
              fi
              if [ -n "${SECOND_LEAD_LINKEDIN}" ]; then
                printf '    linkedin: "%s"\n' "${SECOND_LEAD_LINKEDIN}"
              fi
            fi
            echo "---"
          } > "${TARGET_DIR}/index.md"

          echo "Generated chapter page at ${TARGET_DIR}/index.md"

      - name: Commit and push
        env:
          CITY: ${{ github.event.client_payload.chapter_city }}
          SLUG: ${{ github.event.client_payload.chapter_slug }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "src/chapters/${SLUG}/index.md"
          git commit -m "Add chapter page for ${CITY}

          Auto-generated from approved chapter application.

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git pull --rebase origin main
          git push

      - name: Deploy to production
        run: |
          git fetch origin live-version-swa
          git checkout live-version-swa
          git merge main --no-edit
          git push origin live-version-swa
          echo "✅ Chapter page merged to live-version-swa — deploying to production"